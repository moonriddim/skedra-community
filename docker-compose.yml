name: skedra

x-frontend-build-args: &frontend-build-args
  VITE_APP_URL: ${SKEDRA_PUBLIC_APP_URL:-http://localhost:5174}
  VITE_API_URL: ${SKEDRA_PUBLIC_FRONTEND_API_URL:-}

x-app-environment: &app-environment
  DATABASE_URL: postgresql://${POSTGRES_USER:-skedra}:${POSTGRES_PASSWORD:-skedra_secret}@postgres:5432/${POSTGRES_DB:-skedra}
  AUTH_SECRET: ${SKEDRA_AUTH_SECRET:-change-me-to-a-random-secret-min-32-chars}
  DATA_ENCRYPTION_SECRET: ${SKEDRA_DATA_ENCRYPTION_SECRET:-change-me-to-a-long-random-secret-min-32-chars}
  APP_URL: ${SKEDRA_PUBLIC_APP_URL:-http://localhost:5174}
  API_URL: ${SKEDRA_PUBLIC_API_URL:-http://localhost:5174}
  GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
  GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
  GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
  GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
  SKEDRA_DEPLOYMENT_MODE: ${SKEDRA_DEPLOYMENT_MODE:-selfhost}
  SKEDRA_REGISTRATION_MODE: ${SKEDRA_REGISTRATION_MODE:-invite}

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-skedra}
      POSTGRES_USER: ${POSTGRES_USER:-skedra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-skedra_secret}
    volumes:
      - ${SKEDRA_POSTGRES_DATA:-skedra_postgres_data}:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "PGPASSWORD=\"$${POSTGRES_PASSWORD}\" psql -h 127.0.0.1 -U \"$${POSTGRES_USER:-skedra}\" -d \"$${POSTGRES_DB:-skedra}\" -v ON_ERROR_STOP=1 -tAc \"select 1\" >/dev/null",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      target: api
      args: *frontend-build-args
    restart: unless-stopped
    environment:
      <<: *app-environment
      SKEDRA_CALLS_ENABLED: ${SKEDRA_CALLS_ENABLED:-false}
      SKEDRA_CALL_PROVIDER: ${SKEDRA_CALL_PROVIDER:-none}
      SKEDRA_PUBLIC_LIVEKIT_URL: ${SKEDRA_PUBLIC_LIVEKIT_URL:-}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-}
      LIVEKIT_TOKEN_TTL_SECONDS: ${LIVEKIT_TOKEN_TTL_SECONDS:-3600}
      SKEDRA_OBJECT_STORAGE_PROVIDER: ${SKEDRA_OBJECT_STORAGE_PROVIDER:-inline}
      SKEDRA_OBJECT_STORAGE_PRESET: ${SKEDRA_OBJECT_STORAGE_PRESET:-custom}
      SKEDRA_OBJECT_STORAGE_ENDPOINT: ${SKEDRA_OBJECT_STORAGE_ENDPOINT:-}
      SKEDRA_OBJECT_STORAGE_REGION: ${SKEDRA_OBJECT_STORAGE_REGION:-}
      SKEDRA_OBJECT_STORAGE_BUCKET: ${SKEDRA_OBJECT_STORAGE_BUCKET:-}
      SKEDRA_OBJECT_STORAGE_ACCESS_KEY_ID: ${SKEDRA_OBJECT_STORAGE_ACCESS_KEY_ID:-}
      SKEDRA_OBJECT_STORAGE_SECRET_ACCESS_KEY: ${SKEDRA_OBJECT_STORAGE_SECRET_ACCESS_KEY:-}
      SKEDRA_OBJECT_STORAGE_PUBLIC_BASE_URL: ${SKEDRA_OBJECT_STORAGE_PUBLIC_BASE_URL:-}
      SKEDRA_OBJECT_STORAGE_FORCE_PATH_STYLE: ${SKEDRA_OBJECT_STORAGE_FORCE_PATH_STYLE:-false}
      SKEDRA_ASSET_MAX_IMAGE_BYTES: ${SKEDRA_ASSET_MAX_IMAGE_BYTES:-8388608}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_SECURE: ${SMTP_SECURE:-false}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3001/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      target: web
      args: *frontend-build-args
    restart: unless-stopped
    environment:
      SKEDRA_PUBLIC_APP_URL: ${SKEDRA_PUBLIC_APP_URL:-http://localhost:5174}
      SKEDRA_PUBLIC_FRONTEND_API_URL: ${SKEDRA_PUBLIC_FRONTEND_API_URL:-}
    ports:
      - "${SKEDRA_WEB_PORT:-5174}:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  skedra_postgres_data:
