name: Docker Images

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

env:
  DOCKER_METADATA_SHORT_SHA_LENGTH: 40
  SKEDRA_IMAGE_PREFIX: ${{ github.event.repository.name == 'skedra-community' && 'skedra-community' || 'skedra' }}

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

  build:
    runs-on: ubuntu-latest
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            target: api
          - name: web
            target: web
          - name: libraries
            target: libraries
          - name: standalone
            target: standalone

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ env.SKEDRA_IMAGE_PREFIX }}-${{ matrix.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-production:
    name: Deploy production
    runs-on: ubuntu-latest
    needs: build
    if: github.repository == 'moonriddim/Skedra' && github.event_name == 'push' && github.ref == 'refs/heads/main'
    concurrency:
      group: production
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure restricted SSH access
        env:
          DEPLOY_KEY: ${{ secrets.VPS_DEPLOY_SSH_KEY }}
          KNOWN_HOSTS: ${{ secrets.VPS_DEPLOY_KNOWN_HOSTS }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/skedra-deploy
          chmod 600 ~/.ssh/skedra-deploy
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Stage deployment files
        env:
          DEPLOY_HOST: ${{ vars.VPS_DEPLOY_HOST }}
          DEPLOY_USER: ${{ vars.VPS_DEPLOY_USER }}
        run: |
          tar -czf - \
            docker-compose.managed.yml \
            docker-compose.managed.local-db.yml \
            docker-compose.managed.ops.yml \
            deploy/managed/backup/entrypoint.sh \
            deploy/managed/backup/backup.sh \
            deploy/managed/monitoring \
            deploy/managed/ops/access-admin \
          | ssh -i ~/.ssh/skedra-deploy \
              -o BatchMode=yes \
              "$DEPLOY_USER@$DEPLOY_HOST" \
              "stage sha-$GITHUB_SHA"

      - name: Deploy immutable commit images
        env:
          DEPLOY_HOST: ${{ vars.VPS_DEPLOY_HOST }}
          DEPLOY_USER: ${{ vars.VPS_DEPLOY_USER }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          printf '%s\n%s\n' "$GITHUB_ACTOR" "$GHCR_TOKEN" \
          | ssh -i ~/.ssh/skedra-deploy \
              -o BatchMode=yes \
              "$DEPLOY_USER@$DEPLOY_HOST" \
              "deploy sha-$GITHUB_SHA"

      - name: Verify public health endpoint
        run: curl --fail --silent --show-error --retry 12 --retry-all-errors --retry-delay 5 https://skedra.xyz/api/health

  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp docker-compose.selfhost.yml release/docker-compose.yml
          cp docker-compose.livekit.yml release/docker-compose.livekit.yml
          cp .env.selfhost.example release/env.example
          cp SELFHOST.md release/README.md
          cp SELFHOST_LICENSE release/LICENSE
          sed -i "s|^SKEDRA_IMAGE_REGISTRY=.*|SKEDRA_IMAGE_REGISTRY=ghcr.io/${{ github.repository_owner }}|" release/env.example
          sed -i "s|^SKEDRA_IMAGE_PREFIX=.*|SKEDRA_IMAGE_PREFIX=${{ env.SKEDRA_IMAGE_PREFIX }}|" release/env.example
          sed -i "s|^SKEDRA_IMAGE_TAG=.*|SKEDRA_IMAGE_TAG=${{ github.ref_name }}|" release/env.example
          sed -i "s|ghcr.io/your-github-user|ghcr.io/${{ github.repository_owner }}|g" release/docker-compose.yml
          sed -i "s|ghcr.io/your-github-user|ghcr.io/${{ github.repository_owner }}|g" release/README.md
          sed -i "s|SKEDRA_IMAGE_TAG=latest|SKEDRA_IMAGE_TAG=${{ github.ref_name }}|g" release/README.md
          cat > release/notes.md <<'EOF'
          Self-hosted Docker release for Skedra ${{ github.ref_name }}.

          Images:
          - ghcr.io/${{ github.repository_owner }}/${{ env.SKEDRA_IMAGE_PREFIX }}-api:${{ github.ref_name }}
          - ghcr.io/${{ github.repository_owner }}/${{ env.SKEDRA_IMAGE_PREFIX }}-web:${{ github.ref_name }}
          - ghcr.io/${{ github.repository_owner }}/${{ env.SKEDRA_IMAGE_PREFIX }}-libraries:${{ github.ref_name }}
          - ghcr.io/${{ github.repository_owner }}/${{ env.SKEDRA_IMAGE_PREFIX }}-standalone:${{ github.ref_name }}

          One-container install:
          1. Run `docker run -d --name skedra -p 3000:80 -v skedra_data:/data ghcr.io/${{ github.repository_owner }}/${{ env.SKEDRA_IMAGE_PREFIX }}-standalone:${{ github.ref_name }}`.
          2. Open `http://localhost:3000`.

          Compose install:
          1. Download `docker-compose.yml` and `env.example`.
          2. Rename `env.example` to `.env` and adjust passwords, secrets, URLs, and volume paths.
          3. Run `docker compose --env-file .env up -d`.

          The deployment files are MIT licensed. The Skedra Community images are built from the open-source Skedra codebase (AGPL-3.0-only, with MIT editor packages).

          Database migrations run inside the API container before the API server starts.
          EOF

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            gh release edit "${{ github.ref_name }}" \
              --title "Skedra ${{ github.ref_name }}" \
              --notes-file release/notes.md
          else
            gh release create "${{ github.ref_name }}" \
              --title "Skedra ${{ github.ref_name }}" \
              --notes-file release/notes.md
          fi

          gh release upload "${{ github.ref_name }}" \
            release/docker-compose.yml \
            release/docker-compose.livekit.yml \
            release/env.example \
            release/README.md \
            release/LICENSE \
            --clobber
