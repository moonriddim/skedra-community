name: Docker Images

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/docker-images.yml"
      - "apps/api/**"
      - "apps/mcp/**"
      - "deploy/db/**"
      - "deploy/managed/monitoring/**"
      - "deploy/managed/ops/access-admin/**"
      - "package.json"
      - "packages/db/**"
      - "packages/shared/**"
      - "pnpm-lock.yaml"
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

env:
  DOCKER_METADATA_SHORT_SHA_LENGTH: 40
  SKEDRA_IMAGE_PREFIX: ${{ github.event.repository.name == 'skedra-community' && 'skedra-community' || 'skedra' }}

jobs:
  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: skedra_ci
          POSTGRES_PASSWORD: skedra_ci_password
          POSTGRES_USER: skedra_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U skedra_ci -d skedra_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      APP_URL: http://localhost:5174
      API_URL: http://localhost:3001
      AUTH_SECRET: skedra-ci-auth-secret-0123456789-abcdef
      DATA_ENCRYPTION_SECRET: skedra-ci-data-secret-0123456789-abcdef
      DATABASE_URL: postgresql://skedra_ci:skedra_ci_password@localhost:5432/skedra_ci
      MCP_INTERNAL_API_URL: http://127.0.0.1:3001/api/v1
      SKEDRA_DEPLOYMENT_MODE: selfhost

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Test access administration
        run: npm test --prefix deploy/managed/ops/access-admin

      - name: Initialize MCP E2E database
        run: pnpm --filter @skedra/db db:push

      - name: Start API for MCP E2E
        run: |
          pnpm --filter @skedra/api exec tsx src/index.ts > "$RUNNER_TEMP/skedra-api.log" 2>&1 &
          echo "$!" > "$RUNNER_TEMP/skedra-api.pid"
          for _ in {1..30}; do
            if curl --fail --silent http://localhost:3001/api/health >/dev/null; then
              exit 0
            fi
            if ! kill -0 "$(cat "$RUNNER_TEMP/skedra-api.pid")" 2>/dev/null; then
              break
            fi
            sleep 1
          done
          cat "$RUNNER_TEMP/skedra-api.log"
          exit 1

      - name: Test remote MCP OAuth end to end
        env:
          MCP_E2E_BASE_URL: http://localhost:3001
          MCP_E2E_USER_ID: create
        run: pnpm test:mcp:e2e

      - name: Show MCP E2E API log on failure
        if: failure()
        run: |
          if [ -f "$RUNNER_TEMP/skedra-api.log" ]; then
            tail -n 200 "$RUNNER_TEMP/skedra-api.log"
          fi

  build:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            target: api
          - name: web
            target: web
          - name: libraries
            target: libraries
          - name: standalone
            target: standalone

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ env.SKEDRA_IMAGE_PREFIX }}-${{ matrix.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-production:
    name: Deploy production
    runs-on: ubuntu-latest
    needs: build
    if: github.repository == 'moonriddim/Skedra' && github.event_name == 'push' && github.ref == 'refs/heads/main'
    concurrency:
      group: production
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure restricted SSH access
        env:
          DEPLOY_KEY: ${{ secrets.VPS_DEPLOY_SSH_KEY }}
          KNOWN_HOSTS: ${{ secrets.VPS_DEPLOY_KNOWN_HOSTS }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/skedra-deploy
          chmod 600 ~/.ssh/skedra-deploy
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Stage deployment files
        env:
          DEPLOY_HOST: ${{ vars.VPS_DEPLOY_HOST }}
          DEPLOY_USER: ${{ vars.VPS_DEPLOY_USER }}
        run: |
          tar -czf - \
            docker-compose.managed.yml \
            docker-compose.managed.local-db.yml \
            docker-compose.managed.ops.yml \
            deploy/managed/backup/entrypoint.sh \
            deploy/managed/backup/backup.sh \
            deploy/managed/monitoring \
            deploy/managed/ops/access-admin \
          | ssh -i ~/.ssh/skedra-deploy \
              -o BatchMode=yes \
              "$DEPLOY_USER@$DEPLOY_HOST" \
              "stage sha-$GITHUB_SHA"

      - name: Deploy immutable commit images
        env:
          DEPLOY_HOST: ${{ vars.VPS_DEPLOY_HOST }}
          DEPLOY_USER: ${{ vars.VPS_DEPLOY_USER }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          printf '%s\n%s\n' "$GITHUB_ACTOR" "$GHCR_TOKEN" \
          | ssh -i ~/.ssh/skedra-deploy \
              -o BatchMode=yes \
              "$DEPLOY_USER@$DEPLOY_HOST" \
              "deploy sha-$GITHUB_SHA"

      - name: Verify public health endpoint
        run: |
          curl --fail --silent --show-error --retry 12 --retry-all-errors --retry-delay 5 https://skedra.xyz/api/health

          web_html="$(curl --fail --silent --show-error https://skedra.xyz/)"
          printf '%s' "$web_html" | grep --quiet --fixed-strings 'Kostenlos online zeichnen ohne Konto'

          libraries_html="$(curl --fail --silent --show-error https://libraries.skedra.xyz/)"
          printf '%s' "$libraries_html" | grep --quiet --fixed-strings 'Shape Libraries für Skedra Whiteboard'

          for origin in https://skedra.xyz https://libraries.skedra.xyz; do
            missing_asset_headers="$(curl --silent --show-error --dump-header - --output /dev/null \
              "$origin/assets/skedra-deployment-cache-smoke-test.js")"
            printf '%s' "$missing_asset_headers" | head -n 1 | grep --quiet ' 404 '
            printf '%s' "$missing_asset_headers" | tr -d '\r' | grep --quiet --ignore-case '^cache-control: no-store$'
          done

          curl --fail --silent --show-error https://skedra.xyz/two-factor >/dev/null

          websocket_status="$(curl --http1.1 --silent --show-error --max-time 10 \
            --output /dev/null --write-out '%{http_code}' \
            --header 'Connection: Upgrade' \
            --header 'Upgrade: websocket' \
            --header 'Sec-WebSocket-Version: 13' \
            --header 'Sec-WebSocket-Key: dGhlIHNhbXBsZSBub25jZQ==' \
            https://skedra.xyz/api/boards/00000000-0000-4000-8000-000000000000/presence || true)"
          test "$websocket_status" = "101"

      - name: Notify search engines through IndexNow

        continue-on-error: true
        run: node apps/web/scripts/submit-indexnow.mjs

  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp docker-compose.selfhost.yml release/docker-compose.yml
          cp docker-compose.livekit.yml release/docker-compose.livekit.yml
          cp .env.selfhost.example release/env.example
          cp SELFHOST.md release/README.md
          cp SELFHOST_LICENSE release/LICENSE
          sed -i "s|^SKEDRA_IMAGE_REGISTRY=.*|SKEDRA_IMAGE_REGISTRY=ghcr.io/${{ github.repository_owner }}|" release/env.example
          sed -i "s|^SKEDRA_IMAGE_PREFIX=.*|SKEDRA_IMAGE_PREFIX=${{ env.SKEDRA_IMAGE_PREFIX }}|" release/env.example
          sed -i "s|^SKEDRA_IMAGE_TAG=.*|SKEDRA_IMAGE_TAG=${{ github.ref_name }}|" release/env.example
          sed -i "s|ghcr.io/your-github-user|ghcr.io/${{ github.repository_owner }}|g" release/docker-compose.yml
          sed -i "s|ghcr.io/your-github-user|ghcr.io/${{ github.repository_owner }}|g" release/README.md
          sed -i "s|SKEDRA_IMAGE_TAG=latest|SKEDRA_IMAGE_TAG=${{ github.ref_name }}|g" release/README.md
          cat > release/notes.md <<'EOF'
          Self-hosted Docker release for Skedra ${{ github.ref_name }}.

          Images:
          - ghcr.io/${{ github.repository_owner }}/${{ env.SKEDRA_IMAGE_PREFIX }}-api:${{ github.ref_name }}
          - ghcr.io/${{ github.repository_owner }}/${{ env.SKEDRA_IMAGE_PREFIX }}-web:${{ github.ref_name }}
          - ghcr.io/${{ github.repository_owner }}/${{ env.SKEDRA_IMAGE_PREFIX }}-libraries:${{ github.ref_name }}
          - ghcr.io/${{ github.repository_owner }}/${{ env.SKEDRA_IMAGE_PREFIX }}-standalone:${{ github.ref_name }}

          One-container install:
          1. Run `docker run -d --name skedra -p 3000:80 -v skedra_data:/data ghcr.io/${{ github.repository_owner }}/${{ env.SKEDRA_IMAGE_PREFIX }}-standalone:${{ github.ref_name }}`.
          2. Open `http://localhost:3000`.

          Compose install:
          1. Download `docker-compose.yml` and `env.example`.
          2. Rename `env.example` to `.env` and adjust passwords, secrets, URLs, and volume paths.
          3. Run `docker compose --env-file .env up -d`.

          The deployment files are MIT licensed. The Skedra Community images are built from the open-source Skedra codebase (AGPL-3.0-only, with MIT editor packages).

          Database migrations run inside the API container before the API server starts.
          EOF

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            gh release edit "${{ github.ref_name }}" \
              --title "Skedra ${{ github.ref_name }}" \
              --notes-file release/notes.md
          else
            gh release create "${{ github.ref_name }}" \
              --title "Skedra ${{ github.ref_name }}" \
              --notes-file release/notes.md
          fi

          gh release upload "${{ github.ref_name }}" \
            release/docker-compose.yml \
            release/docker-compose.livekit.yml \
            release/env.example \
            release/README.md \
            release/LICENSE \
            --clobber
