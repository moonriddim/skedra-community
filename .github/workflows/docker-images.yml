name: Docker Images

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            target: api
          - name: realtime
            target: realtime
          - name: web
            target: web
          - name: libraries
            target: libraries
          - name: standalone
            target: standalone

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/skedra-${{ matrix.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp docker-compose.selfhost.yml release/docker-compose.yml
          cp docker-compose.livekit.yml release/docker-compose.livekit.yml
          cp .env.selfhost.example release/env.example
          cp SELFHOST.md release/README.md
          cp SELFHOST_LICENSE release/LICENSE
          sed -i "s|^SKEDRA_IMAGE_REGISTRY=.*|SKEDRA_IMAGE_REGISTRY=ghcr.io/${{ github.repository_owner }}|" release/env.example
          sed -i "s|^SKEDRA_IMAGE_TAG=.*|SKEDRA_IMAGE_TAG=${{ github.ref_name }}|" release/env.example
          sed -i "s|ghcr.io/your-github-user|ghcr.io/${{ github.repository_owner }}|g" release/docker-compose.yml
          sed -i "s|ghcr.io/your-github-user|ghcr.io/${{ github.repository_owner }}|g" release/README.md
          sed -i "s|SKEDRA_IMAGE_TAG=latest|SKEDRA_IMAGE_TAG=${{ github.ref_name }}|g" release/README.md
          cat > release/notes.md <<'EOF'
          Self-hosted Docker release for Skedra ${{ github.ref_name }}.

          Images:
          - ghcr.io/${{ github.repository_owner }}/skedra-api:${{ github.ref_name }}
          - ghcr.io/${{ github.repository_owner }}/skedra-realtime:${{ github.ref_name }}
          - ghcr.io/${{ github.repository_owner }}/skedra-web:${{ github.ref_name }}
          - ghcr.io/${{ github.repository_owner }}/skedra-libraries:${{ github.ref_name }}
          - ghcr.io/${{ github.repository_owner }}/skedra-standalone:${{ github.ref_name }}

          One-container install:
          1. Run `docker run -d --name skedra -p 3000:80 -v skedra_data:/data ghcr.io/${{ github.repository_owner }}/skedra-standalone:${{ github.ref_name }}`.
          2. Open `http://localhost:3000`.

          Compose install:
          1. Download `docker-compose.yml` and `env.example`.
          2. Rename `env.example` to `.env` and adjust passwords, secrets, URLs, and volume paths.
          3. Run `docker compose --env-file .env up -d`.

          The deployment files are MIT licensed. The Skedra Community images are built from the open-source Skedra codebase (AGPL-3.0-only, with MIT editor packages).

          Database migrations run inside the API container before the API server starts.
          EOF

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            gh release edit "${{ github.ref_name }}" \
              --title "Skedra ${{ github.ref_name }}" \
              --notes-file release/notes.md
          else
            gh release create "${{ github.ref_name }}" \
              --title "Skedra ${{ github.ref_name }}" \
              --notes-file release/notes.md
          fi

          gh release upload "${{ github.ref_name }}" \
            release/docker-compose.yml \
            release/docker-compose.livekit.yml \
            release/env.example \
            release/README.md \
            release/LICENSE \
            --clobber
