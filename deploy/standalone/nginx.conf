server {
    listen 80;
    server_name _;

    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    location = /libraries {
        return 301 /libraries/;
    }

    location /libraries/ {
        root /usr/share/skedra;
        try_files $uri $uri/ /libraries/index.html;
    }

    location = /robots.txt {
        root /usr/share/skedra/web;
        default_type text/plain;
        charset utf-8;
        try_files $uri =404;
    }

    location = /sitemap.xml {
        root /usr/share/skedra/web;
        default_type application/xml;
        charset utf-8;
        try_files $uri =404;
    }

    location ~ ^/(?:llms|product|pricing)\.md$ {
        root /usr/share/skedra/web;
        default_type text/markdown;
        charset utf-8;
        try_files $uri =404;
    }

    location = /llms.txt {
        root /usr/share/skedra/web;
        default_type text/plain;
        charset utf-8;
        try_files $uri =404;
    }

    location ~ ^/(?:login|register|subscribe|forgot-password|reset-password|library|settings|board|admin|present|collab|embed)(?:/|$) {
        root /usr/share/skedra/web;
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
        try_files $uri $uri.html $uri/ /index.html;
    }

    location / {
        root /usr/share/skedra/web;
        try_files $uri $uri.html $uri/ =404;
    }
}
