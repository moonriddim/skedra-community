map $request_uri $skedra_libraries_cache_control {
    default "";
    ~^/assets/ "public, max-age=31536000, immutable";
    ~^/config\.js(?:\?|$) "no-store";
    ~^/api/ "no-store";
    ~^/(?:\?|$) "no-cache";
    ~^/index\.html(?:\?|$) "no-cache";
}

map $request_uri $skedra_libraries_robots_header {
    default "";
    ~^/api/ "noindex, nofollow";
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    resolver 127.0.0.11 ipv6=off;
    add_header Cache-Control $skedra_libraries_cache_control always;
    add_header X-Robots-Tag $skedra_libraries_robots_header always;

    location /api/ {
        set $api_upstream http://api:3001;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
