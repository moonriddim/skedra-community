map $request_uri $skedra_libraries_cache_control {
    default "";
    ~^/config\.js(?:\?|$) "no-store";
    ~^/api/ "no-store";
    ~^/(?:robots\.txt|sitemap\.xml)(?:\?|$) "no-cache";
    ~^/(?:\?|$) "no-cache";
    ~^/index\.html(?:\?|$) "no-cache";
}

map $request_uri $skedra_libraries_robots_header {
    default "";
    ~^/api/ "noindex, nofollow";
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    resolver 127.0.0.11 ipv6=off;
    add_header Cache-Control $skedra_libraries_cache_control always;
    add_header X-Robots-Tag $skedra_libraries_robots_header always;

    # Do not serve the catalog HTML fallback for a missing hashed asset. A
    # transiently misrouted app request must remain an uncached 404 instead of
    # poisoning the browser's immutable JavaScript cache.
    location ^~ /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri @asset_not_found;
    }

    location @asset_not_found {
        add_header Cache-Control "no-store" always;
        return 404;
    }

    location /api/ {
        set $api_upstream http://api:3001;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /sitemap.xml {
        set $api_upstream http://api:3001;
        proxy_pass $api_upstream/api/library-catalog/sitemap.xml;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ "^/library/(?<library_slug>[a-z0-9][a-z0-9-]{0,79})$" {
        set $api_upstream http://api:3001;
        proxy_pass $api_upstream/api/library-catalog/pages/$library_slug;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
