map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

map $request_uri $skedra_cache_control {
    default "";
    ~^/assets/ "public, max-age=31536000, immutable";
    ~^/config\.js(?:\?|$) "no-store";
    ~^/api/ "no-store";
    ~^/(?:robots\.txt|sitemap\.xml)(?:\?|$) "no-cache";
    ~^/(?:\?|$) "no-cache";
    ~^/index\.html(?:\?|$) "no-cache";
    ~^/(?:whiteboard|pricing|privacy|terms|imprint)(?:/|\?|$) "no-cache";
    ~^/(?:login|register|two-factor|subscribe|forgot-password|reset-password|library|settings|board|admin|present|collab|embed)(?:/|\?|$) "no-store";
}

map $request_uri $skedra_robots_header {
    default "";
    ~^/api/ "noindex, nofollow";
    ~^/(?:login|register|two-factor|subscribe|forgot-password|reset-password|library|settings|board|admin|present|collab|embed)(?:/|\?|$) "noindex, nofollow, noarchive";
}

server {
    listen 80;
    server_name _;

    if ($host = www.skedra.xyz) {
        return 301 https://skedra.xyz$request_uri;
    }

    root /usr/share/nginx/html;
    index index.html;
    resolver 127.0.0.11 ipv6=off;
    add_header Cache-Control $skedra_cache_control always;
    add_header X-Robots-Tag $skedra_robots_header always;

    location /api/ {
        set $api_upstream http://api:3001;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
        proxy_cache off;
    }

    location = /robots.txt {
        default_type text/plain;
        charset utf-8;
        try_files $uri =404;
    }

    location = /sitemap.xml {
        default_type application/xml;
        charset utf-8;
        try_files $uri =404;
    }

    location ~ ^/(?:llms|product|pricing)\.md$ {
        default_type text/markdown;
        charset utf-8;
        try_files $uri =404;
    }

    location = /llms.txt {
        default_type text/plain;
        charset utf-8;
        try_files $uri =404;
    }

    location ~ ^/(?:login|register|two-factor|subscribe|forgot-password|reset-password|library|settings|board|admin|present|collab|embed)(?:/|$) {
        try_files $uri $uri.html $uri/ /index.html;
    }

    location / {
        try_files $uri $uri.html $uri/ =404;
    }
}
