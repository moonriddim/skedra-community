server {
	listen 80;
	server_name _;
	root /usr/share/nginx/html;
	index index.html;

	location / {
		try_files $uri $uri/ /index.html;
	}

	location = /health {
		access_log off;
		add_header Content-Type text/plain;
		return 200 "ok\n";
	}

	location ~* \.(?:css|js|mjs|png|svg|ico|webp|woff2?)$ {
		try_files $uri =404;
		access_log off;
		add_header Cache-Control "public, max-age=31536000, immutable";
	}
}
